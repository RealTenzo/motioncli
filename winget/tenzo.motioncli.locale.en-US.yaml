ShortDescription: Super-lightweight live wallpaper engine for Windows
Description: >
  Motion CLI is a keyboard-navigable terminal UI for live wallpapers on Windows.
  No Electron, no browser. Uses Windows Media Foundation (MFPlay) for
  hardware-decoded video rendering. Features an online library of 1000+
  wallpapers, per-monitor support, auto-pause on fullscreen/maximized,
  system tray integration, and auto-start on login.
